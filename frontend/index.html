<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pantheon</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Pantheon<span class="dot">.</span></h1>
    <div class="controls">
      <label>Ticker <input id="ticker" value="NVDA" size="6" /></label>
      <label>As of <input id="date" value="2024-05-10" size="10" /></label>
      <button class="run-btn" id="run">Run ▶</button>
      <span id="status" class="status"></span>
    </div>
  </header>

  <div class="layout">
    <div class="col left">
      <h2>Pipeline</h2>
      <div id="pipeline"></div>
    </div>

    <div class="col center">
      <div class="feed" id="feed">
        <div class="empty">Type a ticker and press <b>Run</b> to watch the desk work (live data).</div>
      </div>
    </div>

    <div class="col right">
      <h2>Decision</h2>
      <div class="card decision-card hidden" id="decision">
        <div class="decision-action" id="decision-action">—</div>
        <div class="decision-meta" id="decision-meta"></div>
      </div>
      <h2>Run</h2>
      <div class="card" id="runinfo">
        <div class="pos" id="runinfo-body">No run yet.</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
